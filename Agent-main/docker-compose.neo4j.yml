services:
  neo4j:
    image: ${NEO4J_IMAGE:-neo4j:5}
    container_name: ${NEO4J_CONTAINER_NAME:-agent-neo4j}
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-ChangeThisPassword_123!}"
    volumes:
      - ./.infra/neo4j/data:/data
      - ./.infra/neo4j/logs:/logs
      - ./.infra/neo4j/plugins:/plugins
      - ./.infra/neo4j/conf:/conf