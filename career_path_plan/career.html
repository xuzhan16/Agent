<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职业生涯发展报告 - 动态连接版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
    <style>
        .interactive-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition-all: all;
            transition-duration: 300ms;
        }
        .interactive-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: rgba(59, 130, 246, 0.5);
        }
        .progress-ring__circle {
            transition: stroke-dashoffset 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        /* 加载动画 */
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen relative">

    <div id="loading-overlay" class="absolute inset-0 bg-white/80 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="loader ease-linear rounded-full border-4 border-slate-200 h-12 w-12 mb-4"></div>
        <h2 class="text-center text-slate-600 text-xl font-semibold">正在连接后端 AI 智能体...</h2>
    </div>

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-bold">AI</div>
            <span class="text-xl font-bold text-slate-800">职业规划智能体</span>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-sm text-slate-500">智能医学工程专业</span>
            <div class="w-10 h-10 rounded-full bg-brand-100 border-2 border-brand-500 flex items-center justify-center text-brand-600 font-bold">U</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        <header class="interactive-card rounded-2xl p-8 flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="flex-1 space-y-4">
                <div class="inline-flex items-center px-3 py-1 rounded-full bg-emerald-100 text-emerald-700 text-sm font-medium">
                    报告已生成
                </div>
                <h1 id="ui-primary-job" class="text-3xl font-bold text-slate-900">推荐目标：...</h1>
                <p id="ui-goal-positioning" class="text-slate-600 leading-relaxed text-lg">
                    获取规划策略中...
                </p>
            </div>

            <div class="relative w-40 h-40 flex items-center justify-center flex-shrink-0">
                <svg class="w-full h-full" viewBox="0 0 120 120">
                    <circle class="text-slate-100 stroke-current" stroke-width="8" cx="60" cy="60" r="50" fill="transparent"></circle>
                    <circle id="animated-ring" class="text-brand-500 stroke-current progress-ring__circle" stroke-width="8" stroke-linecap="round" cx="60" cy="60" r="50" fill="transparent" stroke-dasharray="314.159" stroke-dashoffset="314.159"></circle>
                </svg>
                <div class="absolute flex flex-col items-center justify-center">
                    <span id="animated-score" class="text-4xl font-bold text-slate-800">0</span>
                    <span class="text-xs text-slate-500 uppercase font-semibold tracking-wider">匹配度</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <section class="interactive-card rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-slate-800">
                        <span class="w-2 h-6 bg-brand-500 rounded-full mr-3"></span>
                        短期冲刺计划 (3-6个月)
                    </h2>
                    <ul id="ui-short-term-plan" class="space-y-4">
                        </ul>
                </section>

                <section class="interactive-card rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center text-slate-800">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>
                        职业发展路径规划
                    </h2>
                    <div id="ui-long-term-path" class="relative pl-4 border-l-2 border-indigo-100 space-y-8 ml-2">
                        </div>
                </section>
            </div>

            <div class="space-y-8">
                <section class="interactive-card rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-slate-800">
                        <span class="w-2 h-6 bg-rose-500 rounded-full mr-3"></span>
                        高优能力缺口预警
                    </h2>
                    <div id="ui-gap-analysis" class="space-y-4">
                        </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                // 1. 请求后端 API
                const response = await fetch('http://127.0.0.1:8000/api/report');
                const data = await response.json();

                if (data.error) {
                    alert("后端报错：" + data.error);
                    document.getElementById('loading-overlay').style.display = 'none';
                    return;
                }

                // 2. 渲染基本信息
                document.getElementById('ui-primary-job').innerText = "推荐目标：" + (data.primary_target_job || "未定");
                document.getElementById('ui-goal-positioning').innerText = data.decision_summary || data.goal_positioning;

                // 3. 渲染分数动画
                const matchScore = data.selector_metrics?.overall_match_score || 0;
                animateScore(matchScore);

                // 4. 渲染短期计划列表
                const shortTermPlanEl = document.getElementById('ui-short-term-plan');
                if (data.short_term_plan && data.short_term_plan.length > 0) {
                    shortTermPlanEl.innerHTML = data.short_term_plan.map((plan, index) => `
                        <li class="flex items-start bg-brand-50 p-4 rounded-xl border border-brand-100">
                            <div class="flex-shrink-0 w-6 h-6 rounded-full bg-brand-200 flex items-center justify-center mt-0.5 mr-3">
                                <span class="text-brand-700 font-bold text-sm">${index + 1}</span>
                            </div>
                            <p class="text-slate-700">${plan}</p>
                        </li>
                    `).join('');
                } else {
                    shortTermPlanEl.innerHTML = `<p class="text-slate-500">暂无短期计划</p>`;
                }

                // 5. 渲染路径规划 (使用 long_term_path)
                const longTermPathEl = document.getElementById('ui-long-term-path');
                if (data.long_term_path && data.long_term_path.length > 0) {
                    longTermPathEl.innerHTML = data.long_term_path.map((step, index) => {
                        const isPrimary = step === data.primary_target_job;
                        const dotColor = isPrimary ? 'bg-brand-500' : 'bg-slate-400';
                        const textColor = isPrimary ? 'text-brand-700 font-bold' : 'text-slate-800 font-semibold';
                        return `
                            <div class="relative">
                                <div class="absolute -left-[25px] w-4 h-4 ${dotColor} rounded-full border-4 border-white shadow"></div>
                                <h3 class="text-lg ${textColor}">阶段 ${index + 1}：${step}</h3>
                            </div>
                        `;
                    }).join('');
                }

                // 6. 渲染缺口分析 (从 payload 的 gap_analysis 里取 high priority)
                const gapEl = document.getElementById('ui-gap-analysis');
                const gaps = data.career_plan_input_payload?.gap_analysis || [];
                const highGaps = gaps.filter(g => g.priority === "high");

                if (highGaps.length > 0) {
                    gapEl.innerHTML = highGaps.map(gap => `
                        <div class="bg-rose-50 rounded-xl p-4 border border-rose-100">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-bold text-rose-800 text-sm">${gap.gap_type}</span>
                                <span class="bg-rose-200 text-rose-800 text-xs px-2 py-1 rounded font-bold">HIGH</span>
                            </div>
                            <p class="text-slate-700 text-sm"><span class="font-semibold">${gap.gap_item}</span></p>
                            <p class="text-slate-500 text-xs mt-1">${gap.action_hint || '需重点关注补强'}</p>
                        </div>
                    `).join('');
                } else {
                    gapEl.innerHTML = `<p class="text-emerald-600 font-medium p-4 bg-emerald-50 rounded-xl">真棒！当前未发现影响可达性的高危技能缺口。</p>`;
                }

                // 数据加载完毕，隐藏 Loading 遮罩层
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                }, 500);

            } catch (error) {
                console.error("请求失败:", error);
                alert("无法连接到后端，请确保 python app.py 已运行！");
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });

        // 分数环攀升动画逻辑封装
        function animateScore(targetScore) {
            const scoreElement = document.getElementById("animated-score");
            const ringElement = document.getElementById("animated-ring");
            const circumference = 314.159;
            const targetOffset = circumference - (targetScore / 100) * circumference;

            setTimeout(() => { ringElement.style.strokeDashoffset = targetOffset; }, 100);

            let startTimestamp = null;
            const duration = 1500;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOutProgress = progress * (2 - progress);
                scoreElement.innerHTML = Math.floor(easeOutProgress * targetScore);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
